<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026春季中国之旅</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #1a1a2e;
    --paper: #f5f0e8;
    --accent: #c0392b;
    --accent2: #e74c3c;
    --gold: #d4a762;
    --jade: #2e8b6e;
    --sky: #2980b9;
    --mist: rgba(245, 240, 232, 0.95);
  }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--ink);
    color: var(--ink);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #map {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1;
  }

  .title-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: linear-gradient(180deg, rgba(26,26,46,0.92) 0%, rgba(26,26,46,0.7) 80%, transparent 100%);
    padding: 16px 24px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    pointer-events: none;
  }

  .title-bar h1 {
    font-family: 'Noto Serif SC', serif;
    font-weight: 900;
    font-size: 22px;
    color: var(--paper);
    letter-spacing: 6px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }

  .title-bar .subtitle {
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 3px;
    font-weight: 300;
    opacity: 0.9;
  }

  .title-bar .train-icon {
    font-size: 28px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
  }

  /* Sidebar */
  .sidebar {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 380px;
    z-index: 999;
    background: var(--mist);
    backdrop-filter: blur(20px);
    border-left: 1px solid rgba(212, 167, 98, 0.3);
    overflow-y: auto;
    transform: translateX(0);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: -8px 0 40px rgba(0,0,0,0.15);
  }

  .sidebar.collapsed {
    transform: translateX(100%);
  }

  .sidebar-toggle {
    position: fixed;
    right: 380px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 1000;
    width: 32px;
    height: 64px;
    background: var(--mist);
    border: 1px solid rgba(212, 167, 98, 0.3);
    border-right: none;
    border-radius: 8px 0 0 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: var(--ink);
    transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: -4px 0 12px rgba(0,0,0,0.08);
  }

  .sidebar.collapsed ~ .sidebar-toggle {
    right: 0;
  }

  .sidebar-header {
    position: sticky;
    top: 0;
    background: linear-gradient(180deg, var(--ink) 0%, #2c2c4a 100%);
    padding: 72px 24px 20px;
    border-bottom: 2px solid var(--gold);
  }

  .sidebar-header h2 {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    color: var(--paper);
    letter-spacing: 4px;
    font-weight: 700;
  }

  .sidebar-header .stats {
    display: flex;
    gap: 20px;
    margin-top: 12px;
  }

  .stat {
    text-align: center;
  }

  .stat-value {
    font-family: 'Noto Serif SC', serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--gold);
  }

  .stat-label {
    font-size: 10px;
    color: rgba(245, 240, 232, 0.6);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .day-card {
    padding: 16px 24px;
    border-bottom: 1px solid rgba(26, 26, 46, 0.08);
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
  }

  .day-card:hover {
    background: rgba(212, 167, 98, 0.08);
  }

  .day-card.active {
    background: rgba(212, 167, 98, 0.1);
  }

  .day-date {
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .day-city {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .day-city .province-tag {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 10px;
    font-weight: 500;
    color: var(--jade);
    background: rgba(46, 139, 110, 0.1);
    padding: 1px 6px;
    border-radius: 3px;
    letter-spacing: 1px;
  }

  .day-spots {
    list-style: none;
    padding: 0;
  }

  .day-spots li {
    font-size: 13px;
    color: #555;
    padding: 2px 0;
    padding-left: 16px;
    position: relative;
    line-height: 1.6;
  }

  .day-spots li::before {
    content: '';
    position: absolute;
    left: 2px;
    top: 10px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.6;
  }

  .day-number {
    position: absolute;
    right: 20px;
    top: 16px;
    font-family: 'Noto Serif SC', serif;
    font-size: 32px;
    font-weight: 900;
    color: rgba(26, 26, 46, 0.04);
    line-height: 1;
  }

  /* Custom Leaflet markers */
  .city-marker {
    background: none;
    border: none;
  }

  .marker-pin {
    width: 28px;
    height: 28px;
    border-radius: 50% 50% 50% 0;
    background: var(--accent);
    transform: rotate(-45deg);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 10px rgba(192, 57, 43, 0.4);
    border: 2px solid #fff;
    position: relative;
    left: -14px;
    top: -28px;
  }

  .marker-pin.start {
    background: var(--jade);
    box-shadow: 0 3px 10px rgba(46, 139, 110, 0.4);
    width: 34px;
    height: 34px;
    left: -17px;
    top: -34px;
  }

  .marker-pin .marker-number {
    transform: rotate(45deg);
    color: #fff;
    font-family: 'Noto Serif SC', serif;
    font-weight: 900;
    font-size: 11px;
  }

  .marker-pin.start .marker-number {
    font-size: 14px;
  }

  .city-label {
    background: none;
    border: none;
    white-space: nowrap;
  }

  .city-label-inner {
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
    text-shadow: 0 0 6px #fff, 0 0 12px #fff, 0 0 18px #fff, 2px 2px 4px rgba(0,0,0,0.1);
    letter-spacing: 2px;
    padding: 2px 4px;
  }

  /* Popup */
  .leaflet-popup-content-wrapper {
    border-radius: 8px !important;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15) !important;
    border: 1px solid rgba(212, 167, 98, 0.3);
  }

  .leaflet-popup-content {
    font-family: 'Noto Sans SC', sans-serif !important;
    margin: 14px 16px !important;
  }

  .popup-city {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .popup-date {
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .popup-spots {
    list-style: none;
    padding: 0;
  }

  .popup-spots li {
    font-size: 12px;
    color: #444;
    padding: 2px 0 2px 14px;
    position: relative;
  }

  .popup-spots li::before {
    content: '◆';
    position: absolute;
    left: 0;
    color: var(--gold);
    font-size: 8px;
    top: 5px;
  }

  /* Route tooltip */
  .route-tooltip {
    font-family: 'Noto Sans SC', sans-serif !important;
    font-size: 12px !important;
    font-weight: 500 !important;
    letter-spacing: 1px !important;
    padding: 4px 10px !important;
    border-radius: 4px !important;
    border: 1px solid rgba(212, 167, 98, 0.3) !important;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12) !important;
  }

  /* Scenic spot markers */
  .spot-marker {
    background: none;
    border: none;
  }

  .spot-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--gold);
    border: 2px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    position: relative;
    left: -7px;
    top: -7px;
    transition: transform 0.2s ease;
  }

  .spot-dot:hover {
    transform: scale(1.4);
  }

  .spot-dot.highlight {
    background: #e74c3c;
    width: 16px;
    height: 16px;
    left: -8px;
    top: -8px;
  }

  .spot-label {
    background: none;
    border: none;
    white-space: nowrap;
  }

  .spot-label-inner {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 10px;
    font-weight: 500;
    color: #6a5a3e;
    text-shadow: 0 0 4px #fff, 0 0 8px #fff, 0 0 12px #fff;
    letter-spacing: 0.5px;
    padding: 1px 3px;
  }

  /* Spot popup */
  .spot-popup-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 2px;
  }

  .spot-popup-city {
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .spot-popup-desc {
    font-size: 12px;
    color: #555;
    line-height: 1.6;
    max-width: 240px;
  }

  .spot-popup-tag {
    display: inline-block;
    font-size: 10px;
    background: rgba(212, 167, 98, 0.15);
    color: #8a6d3b;
    padding: 1px 6px;
    border-radius: 3px;
    margin-top: 6px;
    letter-spacing: 1px;
  }

  /* Legend */
  .legend {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 999;
    background: var(--mist);
    backdrop-filter: blur(12px);
    padding: 14px 18px;
    border-radius: 10px;
    border: 1px solid rgba(212, 167, 98, 0.3);
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    font-size: 12px;
    max-width: 220px;
  }

  .legend-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 10px;
    letter-spacing: 2px;
  }

  .legend-routes {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(26,26,46,0.08);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    transition: background 0.2s ease;
  }

  .legend-item:hover {
    background: rgba(212, 167, 98, 0.1);
  }

  .legend-item.dimmed {
    opacity: 0.3;
  }

  .legend-line {
    width: 22px;
    height: 4px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    flex-shrink: 0;
  }

  .legend-markers {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .legend-label {
    font-size: 11px;
    color: #555;
    white-space: nowrap;
  }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .day-card {
    animation: fadeInUp 0.4s ease forwards;
    opacity: 0;
  }

  /* Scrollbar */
  .sidebar::-webkit-scrollbar {
    width: 4px;
  }
  .sidebar::-webkit-scrollbar-track {
    background: transparent;
  }
  .sidebar::-webkit-scrollbar-thumb {
    background: rgba(212, 167, 98, 0.3);
    border-radius: 2px;
  }

  @media (max-width: 768px) {
    .sidebar { width: 320px; }
    .sidebar-toggle { right: 320px; }
    .sidebar.collapsed ~ .sidebar-toggle { right: 0; }
    .title-bar h1 { font-size: 17px; letter-spacing: 3px; }
  }

  /* ========== MOBILE: Bottom sheet pattern ========== */
  @media (max-width: 640px) {
    body {
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    .title-bar {
      padding: 10px 14px 20px;
      gap: 10px;
    }
    .title-bar h1 {
      font-size: 15px;
      letter-spacing: 2px;
    }
    .title-bar .subtitle {
      font-size: 9px;
      letter-spacing: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 70vw;
    }
    .title-bar .train-icon { font-size: 22px; }

    /* Sidebar → Bottom sheet */
    .sidebar {
      position: fixed;
      top: auto;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100% !important;
      height: 55vh;
      border-left: none;
      border-top: 1px solid rgba(212, 167, 98, 0.3);
      border-radius: 16px 16px 0 0;
      transform: translateY(calc(100% - 52px));
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 -8px 40px rgba(0,0,0,0.2);
      z-index: 1001;
    }

    .sidebar.sheet-open {
      transform: translateY(0);
    }

    .sidebar.collapsed {
      transform: translateY(100%);
    }

    /* Drag handle */
    .sidebar::before {
      content: '';
      display: block;
      width: 40px;
      height: 4px;
      background: rgba(26, 26, 46, 0.2);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }

    /* Sheet peek bar */
    .sheet-peek {
      display: flex !important;
    }

    .sidebar-header {
      padding: 8px 16px 12px;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .sidebar-header h2 {
      font-size: 14px;
      letter-spacing: 2px;
    }

    .sidebar-header .stats {
      gap: 16px;
      margin-top: 8px;
    }

    .stat-value { font-size: 18px; }
    .stat-label { font-size: 9px; }

    .day-card {
      padding: 12px 16px;
      -webkit-tap-highlight-color: rgba(212, 167, 98, 0.15);
    }

    .day-city { font-size: 15px; }
    .day-spots li { font-size: 12px; line-height: 1.5; }
    .day-number { font-size: 28px; right: 14px; top: 12px; }

    /* Toggle button → floating FAB */
    .sidebar-toggle {
      position: fixed !important;
      right: 16px !important;
      top: auto !important;
      bottom: 68px !important;
      left: auto !important;
      transform: none !important;
      width: 48px !important;
      height: 48px !important;
      border-radius: 50% !important;
      border: 1px solid rgba(212, 167, 98, 0.4) !important;
      background: var(--mist) !important;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15) !important;
      font-size: 16px !important;
      z-index: 1002 !important;
      display: flex !important;
      align-items: center;
      justify-content: center;
    }

    .sidebar.collapsed ~ .sidebar-toggle {
      right: 16px !important;
      bottom: 16px !important;
    }

    /* Legend - compact, collapsible */
    .legend {
      bottom: 62px;
      left: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      max-width: 180px;
      font-size: 11px;
    }

    .legend.legend-collapsed {
      max-width: 110px;
      padding: 8px 10px;
    }

    .legend.legend-collapsed .legend-routes,
    .legend.legend-collapsed .legend-markers {
      display: none;
    }

    .legend-title {
      font-size: 11px;
      margin-bottom: 6px;
      cursor: pointer;
    }

    .legend.legend-collapsed .legend-title {
      margin-bottom: 0;
    }

    .legend.legend-collapsed .legend-title::after {
      content: ' ▸';
    }

    .legend-routes { gap: 3px; margin-bottom: 6px; padding-bottom: 6px; }
    .legend-item { padding: 3px 4px; gap: 6px; }
    .legend-label { font-size: 10px; }
    .legend-line { width: 18px; height: 3px; }

    /* Popup touch-friendly */
    .leaflet-popup-content-wrapper {
      border-radius: 12px !important;
    }
    .leaflet-popup-content {
      margin: 12px 14px !important;
      font-size: 13px !important;
    }
    .spot-popup-desc { font-size: 12px; }

    /* Larger touch targets for map controls */
    .leaflet-control-zoom a {
      width: 36px !important;
      height: 36px !important;
      line-height: 36px !important;
      font-size: 18px !important;
    }

    /* Safe area padding for notch phones */
    .sidebar {
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
  }

  /* Very small screens */
  @media (max-width: 380px) {
    .title-bar h1 { font-size: 13px; letter-spacing: 1px; }
    .title-bar .subtitle { font-size: 8px; max-width: 60vw; }
    .sidebar { height: 50vh; }
    .legend { bottom: 58px; left: 6px; }
  }

  /* Sheet peek tab - hidden on desktop */
  .sheet-peek {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 6px 0 2px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 1px;
    opacity: 0.6;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
</style>
</head>
<body>

<div class="title-bar">
  <span class="train-icon">🚄</span>
  <div>
    <h1>二〇二六 · 春季中国之旅</h1>
    <div class="subtitle">西宁 → 新乡 → 蓬莱 → 长岛 → 济南 → 扬州 → 无锡 → 杭州 → 西宁</div>
  </div>
</div>

<div id="map"></div>

<div class="sidebar" id="sidebar">
  <div class="sheet-peek" id="sheetPeek">
    <span>▲ 行程安排</span>
  </div>
  <div class="sidebar-header">
    <h2>行 程 安 排</h2>
    <div class="stats">
      <div class="stat">
        <div class="stat-value">16</div>
        <div class="stat-label">天</div>
      </div>
      <div class="stat">
        <div class="stat-value">8</div>
        <div class="stat-label">城市</div>
      </div>
      <div class="stat">
        <div class="stat-value">6</div>
        <div class="stat-label">省份</div>
      </div>
      <div class="stat">
        <div class="stat-value">37</div>
        <div class="stat-label">景点</div>
      </div>
    </div>
  </div>
  <div id="day-list"></div>
</div>

<button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">◀</button>

<div class="legend" id="legend">
  <div class="legend-title">🚄 线路图例</div>
  <div class="legend-routes" id="legendRoutes"></div>
  <div class="legend-markers">
    <div class="legend-item">
      <div class="legend-dot" style="background: #2e8b6e;"></div>
      <span>起/终点</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background: #c0392b;"></div>
      <span>途经城市</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background: #d4a762; width:8px; height:8px;"></div>
      <span>景点标注</span>
    </div>
  </div>
</div>

<script>
const itinerary = [
  {
    day: 1, date: '3月14日', city: '西宁', province: '青海',
    lat: 36.617, lng: 101.778,
    spots: ['从西宁出发'],
    isStart: true
  },
  {
    day: 2, date: '3月15日', city: '新乡', province: '河南',
    lat: 35.302, lng: 113.926,
    spots: ['平原博物院', '胖东来·大胖', '胖东来·小胖']
  },
  {
    day: 3, date: '3月16日', city: '新乡（万仙山）', province: '河南',
    lat: 35.302, lng: 113.926,
    spots: ['国家森林公园万仙山', '观看《太行山传奇》抗战实景剧', '挂壁公路（世界第九大奇迹）', '郭亮村（悬崖村、愚公房）']
  },
  {
    day: 4, date: '3月17日', city: '蓬莱', province: '山东',
    lat: 37.810, lng: 120.758,
    spots: ['八仙居', '蓬莱仙境']
  },
  {
    day: 5, date: '3月18日', city: '蓬莱', province: '山东',
    lat: 37.810, lng: 120.758,
    spots: ['八仙过海景区', '蓬莱阁']

// Draw train routes
const routePolylines = [];
trainRoutes.forEach((route, idx) => {
  const color = routeColors[idx] || '#999';

  // Shadow line
  L.polyline(route.waypoints, {
    color: '#000',
    weight: 6,
    opacity: 0.06,
    smoothFactor: 1.5
  }).addTo(map);

  // Main line
  const polyline = L.polyline(route.waypoints, {
    color: color,
    weight: 4,
    opacity: 0.82,
    smoothFactor: 1.5,
    lineCap: 'round',
    lineJoin: 'round'
  }).addTo(map);

  // Tooltip on hover
  polyline.bindTooltip(`${route.from} → ${route.to}`, {
    sticky: true,
    className: 'route-tooltip',
    direction: 'top',
    offset: [0, -8]
  });

  routePolylines.push(polyline);
});

// Populate legend
const legendRoutes = document.getElementById('legendRoutes');
trainRoutes.forEach((route, idx) => {
  const color = routeColors[idx] || '#999';
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `
    <div class="legend-line" style="background:${color};"></div>
    <span class="legend-label">${route.from} → ${route.to}</span>
  `;
  item.addEventListener('click', () => {
    // Highlight this route, dim others
    const isDimmed = item.classList.contains('active-route');
    document.querySelectorAll('.legend-item').forEach(el => {
      el.classList.remove('active-route');
      el.classList.remove('dimmed');
    });
    if (!isDimmed) {
      item.classList.add('active-route');
      document.querySelectorAll('#legendRoutes .legend-item').forEach((el, i) => {
        if (i !== idx) el.classList.add('dimmed');
      });
      routePolylines.forEach((pl, i) => {
        pl.setStyle({ opacity: i === idx ? 1 : 0.1, weight: i === idx ? 6 : 2 });
      });
      const pad = window.innerWidth <= 640 ? [60, 40, 100, 40] : [80, 420, 80, 80];
      map.fitBounds(routePolylines[idx].getBounds(), { padding: pad, maxZoom: 9 });
    } else {
      routePolylines.forEach((pl, i) => {
        pl.setStyle({ opacity: 0.82, weight: 4 });
      });
    }
  });
  legendRoutes.appendChild(item);
});

// Deduplicated city markers
const uniqueCities = [];
const seenCities = new Set();
itinerary.forEach(day => {
  const key = `${day.lat},${day.lng}`;
  if (!seenCities.has(key)) {
    seenCities.add(key);
    uniqueCities.push(day);
  }
});

const markers = {};
uniqueCities.forEach((city, idx) => {
  const isStartEnd = city.isStart || city.isEnd;
  const markerSize = isStartEnd ? 34 : 28;

  const icon = L.divIcon({
    className: 'city-marker',
    html: `<div class="marker-pin ${isStartEnd ? 'start' : ''}">
             <span class="marker-number">${isStartEnd ? '⬟' : (idx + 1)}</span>
           </div>`,
    iconSize: [markerSize, markerSize * 1.3],
    iconAnchor: [0, 0]
  });

  // Collect all days for this city
  const cityDays = itinerary.filter(d => d.lat === city.lat && d.lng === city.lng);
  let popupContent = `<div class="popup-city">${city.city}</div>`;
  cityDays.forEach(d => {
    popupContent += `<div class="popup-date">${d.date}</div><ul class="popup-spots">`;
    d.spots.forEach(s => { popupContent += `<li>${s}</li>`; });
    popupContent += '</ul>';
  });

  const marker = L.marker([city.lat, city.lng], { icon })
    .addTo(map)
    .bindPopup(popupContent, { maxWidth: 260, offset: [0, -20] });

  // City label
  const cleanName = city.city.replace(/（.*）/, '').replace(/→.*/, '').trim();
  const labelIcon = L.divIcon({
    className: 'city-label',
    html: `<div class="city-label-inner">${cleanName}</div>`,
    iconSize: [100, 20],
    iconAnchor: [-8, 32]
  });
  L.marker([city.lat, city.lng], { icon: labelIcon, interactive: false }).addTo(map);

  markers[`${city.lat},${city.lng}`] = marker;
});

    desc: '西湖龙井茶核心产区，狮峰龙井被誉为"绿茶皇后"，山间茶园层叠，是品味顶级龙井的朝圣之地。', tag: '茶文化' },
  { name: '老龙井御茶园', lat: 30.218, lng: 120.102, city: '杭州',
    desc: '乾隆皇帝亲封的御茶园，十八棵御茶树至今犹存，是龙井茶文化的发源地，山谷中古朴清幽。', tag: '茶文化' },
  { name: '西溪国家湿地公园', lat: 30.275, lng: 120.062, city: '杭州',
    desc: '中国首个国家湿地公园，以"一曲溪流一曲烟"闻名，水网交织，芦苇摇曳，是城市中的世外桃源。', tag: '湿地生态' },
  { name: '河坊街', lat: 30.245, lng: 120.170, city: '杭州',
    desc: '杭州最具代表性的历史步行街，南宋御街遗址所在，汇集胡庆余堂等百年老字号和传统手工艺。', tag: '历史街区' },
  { name: '吴山夜市', lat: 30.242, lng: 120.168, city: '杭州',
    desc: '杭州最热闹的夜市之一，毗邻吴山广场，夜幕降临后小吃摊位与民间艺术齐聚，是感受杭州烟火气的最佳去处。', tag: '夜市美食' },
];

// Create scenic spot layer group (can toggle visibility)
const spotLayerGroup = L.layerGroup().addTo(map);

scenicSpots.forEach(spot => {
  const dotIcon = L.divIcon({
    className: 'spot-marker',
    html: `<div class="spot-dot"></div>`,
    iconSize: [14, 14],
    iconAnchor: [0, 0]
  });

  const popupContent = `
    <div class="spot-popup-name">${spot.name}</div>
    <div class="spot-popup-city">${spot.city}</div>
    <div class="spot-popup-desc">${spot.desc}</div>
    <div class="spot-popup-tag">${spot.tag}</div>
  `;

  const spotMarker = L.marker([spot.lat, spot.lng], { icon: dotIcon })
    .bindPopup(popupContent, { maxWidth: 280, offset: [0, -4] });

  spotLayerGroup.addLayer(spotMarker);

  // Add tiny label at higher zoom levels
  const spotLabelIcon = L.divIcon({
    className: 'spot-label',
    html: `<div class="spot-label-inner">${spot.name}</div>`,
    iconSize: [120, 16],
    iconAnchor: [-6, 18]
  });
  const spotLabel = L.marker([spot.lat, spot.lng], { icon: spotLabelIcon, interactive: false });
  spotLayerGroup.addLayer(spotLabel);
});

// Show/hide spot labels based on zoom
map.on('zoomend', () => {
  const zoom = map.getZoom();
  document.querySelectorAll('.spot-label').forEach(el => {
    el.style.display = zoom >= 9 ? 'block' : 'none';
  });
  document.querySelectorAll('.spot-dot').forEach(el => {
    el.style.display = zoom >= 6 ? 'block' : 'none';
  });
});
// Trigger initial state
map.fire('zoomend');

// Map day index to route segment color
const dayRouteColorMap = {
  0: 0,  // Day 1: 西宁出发 → 新乡
  1: 0, 2: 0,  // Day 2-3: 新乡
  3: 1, 4: 1,  // Day 4-5: 蓬莱 (from 新乡)
  5: 2,  // Day 6: 长岛 (from 蓬莱)
  6: 3, 7: 3,  // Day 7-8: 济南 (from 长岛)
  8: 4, 9: 4,  // Day 9-10: 扬州 (from 济南)
  10: 5, 11: 5, 12: 5,  // Day 11-13: 无锡 (from 扬州)
  13: 6, 14: 6, 15: 6,  // Day 14-16: 杭州 (from 无锡)
  16: 7   // Day 17: 返回西宁
};

// Populate sidebar
const dayList = document.getElementById('day-list');
itinerary.forEach((day, idx) => {
  const card = document.createElement('div');
  card.className = 'day-card';
  card.style.animationDelay = `${idx * 0.04}s`;
  card.dataset.lat = day.lat;
  card.dataset.lng = day.lng;

  const routeIdx = dayRouteColorMap[idx] !== undefined ? dayRouteColorMap[idx] : 0;
  const cardColor = routeColors[routeIdx];
  card.style.borderLeft = `4px solid ${cardColor}`;

  const cityName = day.city.replace(/（.*）/, '');

  card.innerHTML = `
    <div class="day-number">${String(day.day).padStart(2, '0')}</div>
    <div class="day-date" style="color:${cardColor}">${day.date}</div>
    <div class="day-city">
      ${cityName}
      <span class="province-tag">${day.province}</span>
    </div>
    <ul class="day-spots">
      ${day.spots.map(s => `<li>${s}</li>`).join('')}
    </ul>
  `;

  card.addEventListener('click', () => {
    document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    map.flyTo([day.lat, day.lng], 12, { duration: 1.2 });
    const key = `${day.lat},${day.lng}`;
    if (markers[key]) {
      setTimeout(() => markers[key].openPopup(), 600);
    }
    handleDayCardMobile();
  });

  dayList.appendChild(card);
});

// Sidebar toggle - responsive
const isMobile = () => window.innerWidth <= 640;

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const btn = document.getElementById('sidebarToggle');

  if (isMobile()) {
    if (sidebar.classList.contains('sheet-open')) {
      sidebar.classList.remove('sheet-open');
      btn.innerHTML = '📋';
    } else if (sidebar.classList.contains('collapsed')) {
      sidebar.classList.remove('collapsed');
      btn.innerHTML = '📋';
    } else {
      sidebar.classList.add('sheet-open');
      btn.innerHTML = '✕';
    }
  } else {
    sidebar.classList.toggle('collapsed');
    btn.innerHTML = sidebar.classList.contains('collapsed') ? '▶' : '◀';
  }
}

// Sheet peek tap to open
document.getElementById('sheetPeek').addEventListener('click', () => {
  const sidebar = document.getElementById('sidebar');
  const btn = document.getElementById('sidebarToggle');
  sidebar.classList.add('sheet-open');
  btn.innerHTML = '✕';
});

// Touch swipe to dismiss bottom sheet
let touchStartY = 0;
let touchCurrentY = 0;
const sidebar = document.getElementById('sidebar');

sidebar.addEventListener('touchstart', (e) => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });

sidebar.addEventListener('touchmove', (e) => {
  touchCurrentY = e.touches[0].clientY;
}, { passive: true });

sidebar.addEventListener('touchend', () => {
  if (!isMobile()) return;
  const deltaY = touchCurrentY - touchStartY;
  if (deltaY > 60 && sidebar.classList.contains('sheet-open')) {
    sidebar.classList.remove('sheet-open');
    document.getElementById('sidebarToggle').innerHTML = '📋';
  } else if (deltaY < -40 && !sidebar.classList.contains('sheet-open')) {
    sidebar.classList.add('sheet-open');
    document.getElementById('sidebarToggle').innerHTML = '✕';
  }
  touchStartY = 0;
  touchCurrentY = 0;
});

// Legend collapse on mobile
document.querySelector('.legend-title').addEventListener('click', () => {
  if (!isMobile()) return;
  document.getElementById('legend').classList.toggle('legend-collapsed');
});

// On mobile, clicking a day card auto-closes the sheet
function handleDayCardMobile() {
  if (isMobile()) {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.remove('sheet-open');
    document.getElementById('sidebarToggle').innerHTML = '📋';
  }
}

// Start mobile with legend collapsed
if (isMobile()) {
  document.getElementById('legend').classList.add('legend-collapsed');
  document.getElementById('sidebarToggle').innerHTML = '📋';
}

// Initial view: China full territory
// (set in map init above)
</script>
